[files]
extend-exclude = [
  "target/",
  "*.lock",
  "**/*.md",
  "notes/",
  "apps/site/messages/",
  "apps/site/public/docs/",
  "crates/compiler/zo-vscode/out/",
]

[default.extend-words]
eazy = "eazy"
# Apple's Unique Device Identifier — not a UUID misspelling.
udid = "udid"

[default.extend-identifiers]
bitcase = "bitcase"
