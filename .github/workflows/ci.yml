name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # `zo-misato/build.rs` links against `libraylib` at compile
  # time. Every job that compiles the workspace must put raylib
  # on the search path before `cargo {check,clippy,build,test}`.
  # Pinned in lockstep with `compiler-lib/std/raylib.zo`'s
  # `pub ffi` surface — same version `release.yml` packages.
  RAYLIB_VERSION: "5.5"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
      - name: Install raylib
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_linux_amd64.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all --all-targets -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
      - name: Install raylib
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_linux_amd64.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
      - name: Install raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_linux_amd64.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - name: Install raylib (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_macos.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --all
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test -p zo-tokenizer -p zo-parser -p zo-executor -p zo-sir -p zo-styler -p zo-codegen-arm -p zo-runtime-web -p zo-test-runner

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
      - name: Install raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_linux_amd64.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - name: Install raylib (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          URL="https://github.com/raysan5/raylib/releases/download/${RAYLIB_VERSION}/raylib-${RAYLIB_VERSION}_macos.tar.gz"
          mkdir -p $HOME/raylib
          curl -sL "$URL" | tar xz -C $HOME/raylib --strip-components=1
          echo "RAYLIB_LIB_DIR=$HOME/raylib/lib" >> $GITHUB_ENV
        shell: bash
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build release (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release
      - name: Build release (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release -p zo-tokenizer -p zo-parser -p zo-executor -p zo-sir -p zo-styler -p zo-codegen-arm -p zo-runtime-web -p zo-test-runner
