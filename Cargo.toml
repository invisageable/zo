# internal:crates:fret.
fret = { path = "crates/packager/fret", version = "0.4.0" }
fret-driver = { path = "crates/packager/fret-driver", version = "0.4.0" }
fret-parser = { path = "crates/packager/fret-parser", version = "0.4.0" }
fret-pipeline = { path = "crates/packager/fret-pipeline", version = "0.4.0" }
fret-tokenizer = { path = "crates/packager/fret-tokenizer", version = "0.4.0" }
