fret-types = { path = "crates/packager/fret-types", version = "0.4.0" }

# external:crates.
ammonia = "4.1.2"
anyhow = "1.0.102"
ariadne = "0.6.0"
base64 = "0.22.1"
brotli = "8.0.2"
calamine = "0.32.0"
chrono = "0.4.44"
clap = { version = "4.5.49", features = ["derive"] }
console_error_panic_hook = { version = "0.1.7" }
cranelift = "0.130.1"
cranelift-codegen = { version = "0.130.1", features = ["x86", "arm64"] }
cranelift-module = "0.130.1"
cranelift-jit = "0.130.1"
cranelift-native = "0.130.1"
cranelift-object = "0.130.1"
criterion = { version = "0.7.0", features = ["html_reports"] }
crossbeam = "0.8.4"
eframe = { version = "0.34.1", features = [
  "accesskit",
  "default_fonts",
  "persistence",
  "wgpu",
  "wayland",   # Linux
  "x11",       # Linux
] }
egui_extras = { version = "0.34.1", default-features = false, features = [
  "file",
  "image",
  "svg",
] }
egui_kittest = { version = "0.34.1", default-features = false, features = [
  "snapshot",
  # "wgpu",
]}
env_logger = "0.11.5"
fastrand = "2.3.0"
flume = { version = "0.11.1", default-features = true, features = ["async"] }
futures = "0.3.31"
gif = "0.14.0"
gilrs = "0.11.1"
glyphon = "0.9.0"
hashbrown = { version = "0.16.0",  default-features = true, features = [
  "rayon",
  "serde",
] }
js-sys = "0.3.81"
kanal = "0.1.1"
libm = "0.2.15"
libzstd-rs-sys = "0.0.0"
lyon_geom = "1.0.17"
image = { version = "0.25.10", default-features = false, features = [
  "jpeg",
  "png",
  "gif",
  "webp",
] }
indoc = "2.0.7"
itoa = "1.0.18"
Inflector = "0.11.4"
insta = { version = "1.47.2", features = ["yaml"] }
lightningcss = { version = "1.0.0-alpha.71", features = ["visitor"] }
libc = "0.2.176"
libloading = "0.9.0"
log = "0.4.29"
noise = "0.9.0"
notify = "8.2.0"
notify-debouncer-mini = "0.7.0"
objc2 = "0.6"
objc2-core-foundation = { version = "0.3", features = ["objc2", "CFCGTypes"] }
objc2-foundation = { version = "0.3", features = [
  "NSString",
  "NSArray",
  "NSObject",
  "NSDictionary",
  "NSGeometry",
  "NSProcessInfo",
  "NSData",
  "NSBundle",
] }
objc2-ui-kit = { version = "0.3", features = [
  "UIApplication",
  "UIResponder",
  "UIWindow",
  "UIView",
  "UIViewController",
  "UIControl",
  "UIButton",
  "UILabel",
  "UITextField",
  "UIScene",
  "UIWindowScene",
  "UISceneOptions",
  "UISceneSession",
  "UIScreen",
  "UIColor",
  "UIGeometry",
  "UIFont",
  "UIVisualEffect",
  "UIVisualEffectView",
  "UIGlassEffect",
  "UIButtonConfiguration",
  "UIImage",
  "UIImageView",
  "objc2-core-foundation",
  "objc2-quartz-core",
  "objc2-core-graphics",
] }
# The glass panel's specular rim is drawn on the effect view's
# `CALayer` (`setBorderColor` takes a `CGColor`), so quartz-core needs
# its `objc2-core-graphics` feature — `objc2-ui-kit` pulls quartz-core
# but only with default features, so enable it here for the whole graph.
objc2-quartz-core = { version = "0.3", features = [
  "CALayer",
  "objc2-core-graphics",
] }
num_cpus = "1.17.0"
parking_lot = { version = "0.12.5", features = ["nightly"] }
pdfium-render = "0.9.0"
postcard = { version = "1.1.3", default-features = false, features = ["use-std"] }
posthog-rs = "0.6.0"
profiling = "1.0.17"
proptest = "1.11.0"
pulldown-cmark = "0.13.3"
quote = "1.0.45"
raw-window-handle = "0.6.2"
raylib = "5.5.1"
rayon = { version = "1.12.0" }
regex = "1.12.2"
reqwest = { version = "0.13.3", default-features = false, features = [
  "json",
  "multipart",
  "native-tls",
  "stream",
] }
resvg = "0.47.0"
rfd = "0.17.2"
rusqlite = { version = "0.32", features = ["bundled"] }
rustc-hash = "2.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
sha1 = "0.10.6"
sha2 = { version = "0.10.9" }
smallvec = { version = "1.15.1", features = ["const_new", "serde"] }
smol_str = { version = "0.3.6", features = ["serde"] }
syn = { version = "2.0", features = ["full"] }
sysinfo = "0.39.2"
taffy = { version = "0.8", default-features = false, features = [
  "std",
  "taffy_tree",
  "flexbox",
] }
target-lexicon = "0.13.5"
tempfile = "3.27.0"
thin-vec = "0.2.18"
tokio = { version = "1.52.1", default-features = true , features = [
  "fs",
  "io-std",
  "macros",
  "rt-multi-thread",
  "sync",
  "time",
] }
toml = "1.1.2+spec-1.1.0"
tower-lsp = "0.20.0"
tree-sitter = "0.26.8"
tree-sitter-language = "0.1.7"
ureq = "3.3.0"
usvg = "0.45.1"
uuid = { version = "1.23.1", features = ["serde", "v4", "v7"] }
walkdir = "2.5.0"
wasm-bindgen = "0.2.120"
wasm-bindgen-futures = "0.4.70"
wasmi = "1.0.9"
web-sys = { version = "0.3.97", features = [
  "Comment",
  "console",
  "CssStyleDeclaration",
  "Document",
  "Element",
  "Event",
  "EventListener",
  "EventTarget",
  "HtmlCollection",
  "HtmlElement",
  "HtmlHeadElement",
  "HtmlInputElement",
  "InputEvent",
  "KeyboardEvent",
  "MouseEvent",
  "Node",
  "NodeList",
  "Performance",
  "Response",
  "Text",
  "Window",
] }
wide = { version = "1.4.0", features = ["serde"] }
winit = "0.30.13"
wry = "0.55.0"
zmij = "1.0.21"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
