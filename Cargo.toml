zo-runtime-ios = { path = "crates/compiler/zo-runtime-ios", version = "0.4.0" }
zo-runtime-native = { path = "crates/compiler/zo-runtime-native", version = "0.4.0" }
zo-runtime-render = { path = "crates/compiler/zo-runtime-render", version = "0.4.0" }
zo-runtime-web = { path = "crates/compiler/zo-runtime-web", version = "0.4.0" }
zo-provider-json = { path = "crates/compiler/zo-provider-json", version = "0.4.0" }
zo-provider-raylib = { path = "crates/compiler/zo-provider-raylib", version = "0.4.0" }
