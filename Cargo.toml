zo-codegen = { path = "crates/compiler/zo-codegen", version = "0.4.0" }
zo-codegen-arm = { path = "crates/compiler/zo-codegen-arm", version = "0.4.0" }
zo-codegen-backend = { path = "crates/compiler/zo-codegen-backend", version = "0.4.0" }
