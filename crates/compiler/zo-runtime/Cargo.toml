[package]
name = "zo-runtime"
version.workspace = true
edition.workspace = true

[lib]
doctest = false
# - `lib` — use for regular Rust library.
# - `staticlib` — use `libzo_runtime.a` for a future static-link path.
# - `cdylib` — use `libzo_runtime.dylib` on macOS / `libzo_runtime.so` on Linux.
crate-type = ["lib", "staticlib", "cdylib"]

[features]
# The graphical / webview runtime (`eframe` + `wgpu` + `wry`
# plus the image and TLS trees) is the bulk of the build. Gate
# it behind `ui` so lean CLI / CI builds skip the whole GPU +
# webview dependency tree with `--no-default-features`.
default = ["ui"]
# `dep:` references resolve per target: on iOS only `zo-runtime-ios`
# + `zo-runtime-render` exist (native/web are `cfg(not(ios))` — eframe
# does not build for iOS), so the feature activates exactly the
# backend present on the target.
ui = [
  "dep:zo-runtime-render",
  "dep:zo-runtime-native",
  "dep:zo-runtime-web",
  "dep:zo-runtime-ios",
]

[dependencies]
# internal:sources.

# internal:crates.
zo-c-abi = { workspace = true }
zo-error = { workspace = true }
zo-reporter = { workspace = true }
zo-ui-protocol = { workspace = true }
zo-runtime-render = { workspace = true, optional = true }

# external:crates.
base64 = { workspace = true }
libc = { workspace = true }
regex = { workspace = true }
rustc-hash = { workspace = true }
sha1 = { workspace = true }
sysinfo = { workspace = true }

# eframe (native) + wry (web) do not build for iOS, so the desktop
# backends are gated off iOS; the UIKit backend takes their place.
[target.'cfg(not(target_os = "ios"))'.dependencies]
zo-runtime-native = { workspace = true, optional = true }
zo-runtime-web = { workspace = true, optional = true }

[target.'cfg(target_os = "ios")'.dependencies]
zo-runtime-ios = { workspace = true, optional = true }

# `sha2-asm` (pulled in by `sha2/asm`) ships GNU-syntax `.S`
# files that MSVC's `cl.exe` can't assemble — Windows CI
# fails to build it. Enable the `asm` feature only on non-
# MSVC targets; on MSVC the `cpufeatures` SHA-NI path covers
# x86_64 acceleration without inline assembly.
[target.'cfg(not(target_env = "msvc"))'.dependencies]
sha2 = { workspace = true, features = ["asm"] }

[target.'cfg(target_env = "msvc")'.dependencies]
sha2 = { workspace = true }

[dev-dependencies]
# external:crates.
criterion = { workspace = true }
proptest = { workspace = true }

# Concurrency benchmarks — run under `criterion` so the
# statistical harness (warm-up, sample-size calibration,
# outlier rejection) matches the rest of the workspace
# (`zo-parser`, `zo-executor`). Each file exposes a
# `criterion_main!` entry point; `harness = false` is
# NOT set so cargo-bench wires criterion's own `main`.
[[bench]]
name = "runtime_bench"
path = "benches/runtime_bench.rs"
harness = false

[[bench]]
name = "cost_decomposition"
path = "benches/cost_decomposition.rs"
harness = false
