[package]
name = "zo-runtime"
version.workspace = true
edition.workspace = true

[lib]
doctest = false
# - `lib` — regular Rust library so other workspace crates
#   (zo-driver etc.) keep using this as a regular Rust lib.
# - `staticlib` — `libzo_runtime.a` for a future static-link
#   path (kept for completeness; not the Phase 7 default).
# - `cdylib` — `libzo_runtime.dylib` on macOS /
#   `libzo_runtime.so` on Linux. The Mach-O writer
#   (Phase 7) adds `LC_LOAD_DYLIB` entries pointing at
#   `@executable_path/libzo_runtime.dylib`, so user
#   binaries resolve the `_zo_chan_*` / `_zo_task_*`
#   symbols via dyld at load time.
crate-type = ["lib", "staticlib", "cdylib"]

[dependencies]
# internal:sources.

# internal:crates.
zo-error = { workspace = true }
zo-reporter = { workspace = true }
zo-ui-protocol = { workspace = true }
zo-runtime-native = { workspace = true }
zo-runtime-render = { workspace = true }
zo-runtime-web = { workspace = true }

# external:crates.

# Concurrency benchmarks — hand-rolled timing harness,
# no `criterion` dep. Each file owns its own `main`
# (`harness = false`) so `cargo bench -p zo-runtime`
# runs the exact timing code the author wrote, no
# framework magic in between.
[[bench]]
name = "runtime_bench"
path = "benches/runtime_bench.rs"
harness = false

[[bench]]
name = "cost_decomposition"
path = "benches/cost_decomposition.rs"
harness = false
