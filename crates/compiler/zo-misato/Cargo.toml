[package]
name = "zo-misato"
version.workspace = true
edition.workspace = true

[lib]
doctest = false
# `cdylib` is the live target — Mach-O writer adds
# `LC_LOAD_DYLIB @executable_path/libzo_misato.dylib` to
# user binaries that touch any `__zo_misato_*` symbol, and
# the compiler stages it alongside them. `lib` and
# `staticlib` are reserved for future direct linking.
crate-type = ["lib", "staticlib", "cdylib"]

[dependencies]
# internal:sources.

# internal:crates.
zo-ecs = { workspace = true }

# external:crates.
