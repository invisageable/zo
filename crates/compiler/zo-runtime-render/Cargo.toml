[package]
name = "zo-runtime-render"
version.workspace = true
edition.workspace = true

[lib]
doctest = false

# `http` pulls `ureq` (→ rustls → ring) for URL image sources. Off by
# default so the iOS runtime stays lean — a device bundles its assets
# and never needs a TLS stack. Only the desktop (egui) runtime enables
# it; the local-file loader is always available.
[features]
http = ["dep:ureq"]

[dependencies]
# internal:sources.

# internal:crates.
zo-interner = { workspace = true }
zo-sir = { workspace = true }
zo-span = { workspace = true }
zo-ty = { workspace = true }
zo-ui-protocol = { workspace = true }
zo-value = { workspace = true }

# external:crates.
rustc-hash = { workspace = true }
taffy = { workspace = true }
thin-vec = { workspace = true }
ureq = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "reactive"
harness = false
