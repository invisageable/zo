[package]
name = "zo-runtime-native"
version.workspace = true
edition.workspace = true

[lib]
# `cdylib` exposes `_zo_run_native` (defined in `src/ffi.rs`)
# as a stable C ABI symbol. AOT-compiled `zo build` exes
# link against `libzo_runtime_native.dylib` and call into
# it at startup with a `ZoRuntimeContext` struct.
crate-type = ["rlib", "cdylib"]
doctest = false

[dependencies]
# internal:sources.

# internal:crates.
zo-error = { workspace = true }
zo-reporter = { workspace = true }
zo-ui-protocol = { workspace = true }
# `http` enables URL image sources (desktop has no asset bundle).
zo-runtime-render = { workspace = true, features = ["http"] }

# external:crates.
eframe = { workspace = true }
image = { workspace = true }
libloading = { workspace = true }
rustc-hash = { workspace = true }
serde = { workspace = true }
thin-vec = { workspace = true }
