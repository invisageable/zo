[package]
name = "zo-writer-macho"
version.workspace = true
edition.workspace = true

[lib]
doctest = false

[dependencies]
# internal:sources.

# internal:crates.

# external:crates.
rustc-hash = { workspace = true }

# `sha2-asm` (pulled in by `sha2/asm`) ships GNU-syntax `.S`
# files that MSVC's `cl.exe` can't assemble — Windows CI
# fails to build it. Enable the `asm` feature only on non-
# MSVC targets where the toolchain has GNU `as`/`gcc`.
# x86_64 hardware acceleration on Windows MSVC kicks in
# automatically via `cpufeatures` without needing `asm`.
[target.'cfg(not(target_env = "msvc"))'.dependencies]
sha2 = { workspace = true }

[target.'cfg(target_env = "msvc")'.dependencies]
sha2 = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }

[[bench]]
name = "write"
harness = false
