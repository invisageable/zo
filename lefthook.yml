pre-commit:
  piped: true
  commands:
    typos:
      run: just typos

    fmt:
      glob: "**/*.rs"
      run: just fmt
      stage_fixed: true

    clippy:
      glob: "**/*.rs"
      run: just clippy
      stage_fixed: true

    test_all:
      glob: "**/*.zo"
      run: just test_all
      stage_fixed: true

    # bench:
    #   glob: "**/*.rs"
