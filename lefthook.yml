pre-commit:
  piped: true
  commands:
    typos:
      run: just typos

    fmt:
      glob: "**/*.rs"
      run: just fmt
      stage_fixed: true

    clippy:
      glob: "**/*.rs"
      run: just clippy
      stage_fixed: true

    test:
      glob: "**/*.rs"
      run: just test
      stage_fixed: true

    zo_test_programs:
      glob: "**/*.zo"
      run: just zo_test_programs
      stage_fixed: true
