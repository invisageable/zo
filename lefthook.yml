pre-commit:
  piped: true
  commands:
    typos:
      run: just typos

    fmt:
      glob: "**/*.rs"
      run: just fmt
      stage_fixed: true

    clippy:
      glob: "**/*.rs"
      run: just clippy
      stage_fixed: true

